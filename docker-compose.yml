version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: ["python3", "api_server.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "5173:5173"
    depends_on:
      - backend
