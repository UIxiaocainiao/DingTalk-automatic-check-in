name: Release Desktop Installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-installer:
    name: Build macOS Installer
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm install --prefix desktop

      - name: Build frontend for Electron
        run: npm run build:renderer --prefix desktop

      - name: Build macOS dmg
        run: npm exec --prefix desktop electron-builder -- --config desktop/electron-builder.json --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            desktop/release/*.dmg
          if-no-files-found: error

  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm install --prefix desktop

      - name: Build frontend for Electron
        run: npm run build:renderer --prefix desktop

      - name: Build Windows nsis
        run: npm exec --prefix desktop electron-builder -- --config desktop/electron-builder.json --win nsis --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            desktop/release/*.exe
          if-no-files-found: error

  publish-release-assets:
    name: Publish Installers To Release
    runs-on: ubuntu-latest
    needs:
      - build-macos-installer
      - build-windows-installer
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release-assets/windows

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/macos/*.dmg
            release-assets/windows/*.exe
          overwrite_files: true
